<!DOCTYPE html>
<html lang="en">

<!-- HEAD -->

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | BookTracker</title>

    <!-- Favicon -small icon in browser tab -->
    <link rel="icon" type="image/png" href="img/favicon.png">

    <!-- Bootstrap CSS version 5.3 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS file -->
    <link rel="stylesheet" href="css/style.css">
</head>

<!-- BODY -->

<body class="login-page">

    <!-- Bootstrap container -->
    <div class="container min-vh-100 d-flex justify-content-center align-items-center py-5">

        <!-- Main login box -->
        <div class="login-wrapper row g-0 overflow-hidden">

            <!-- LEFT SIDE (IMAGE) -->
            <div class="col-md-6 d-none d-md-block">

                <div class="login-image h-100">

                    <img src="img/favicon.png" 
                         alt="Books illustration" 
                         class="img-fluid h-100 w-100 object-fit-cover">

                </div>
            </div>

            <!-- RIGHT SIDE (FORM) -->
            <div class="col-md-6">
                <div class="login-form-area d-flex flex-column justify-content-center h-100 p-4 p-lg-5">

                    <!-- TITLE SECTION -->
                    <div class="text-center mb-4">
                        <h1 class="brand-title mb-2">BookTracker</h1>
                        <h4 class="login-title">Login to your account</h4>

                        <p class="login-subtitle mb-0">
                            Welcome back! Enter your details to log in to your account.
                        </p>
                    </div>

                    <!-- FORM START -->
                    <form action="dashboard.html" method="GET">

                        <!-- EMAIL INPUT -->
                        <div class="mb-3">
                            <label for="email" class="form-label custom-label">
                                Email
                            </label>

                            <input type="email" 
                                   class="form-control custom-input" 
                                   id="email" 
                                   name="email" 
                                   placeholder="Enter your email" 
                                   required>

                        </div>

                        <!-- PASSWORD INPUT -->
                        <div class="mb-3">
                            <label for="password" class="form-label custom-label">
                                Password
                            </label>

                            <input type="password" 
                                   class="form-control custom-input" 
                                   id="password" 
                                   name="password" 
                                   placeholder="Enter your password" 
                                   required>
                        </div>

                        <!-- REMEMBER + FORGOT -->
                        <div class="d-flex justify-content-between align-items-center mb-4 small">

                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="remember">

                                <label class="form-check-label text-muted" for="remember">
                                    Remember me
                                </label>
                            </div>

                            <a href="#" class="forgot-link">
                                Forgot password?
                            </a>
                        </div>

                        <!-- LOGIN BUTTON -->
                        <button type="submit" class="btn login-btn w-100 mb-3">
                            Login
                        </button>

                    </form>

                    <!-- CREATE ACCOUNT LINK -->
                    <p class="text-center mb-0 small">
                        New here? 
                        <a href="register.html" class="create-link">
                            Create account
                        </a>
                    </p>

                </div>
            </div>

        </div>
    </div>

    <!-- Bootstrap JavaScript  -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
