<!DOCTYPE html>
<html lang="en">

<!-- HEAD -->

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Books| BookTracker</title>

    <!-- Favicon -small icon in browser tab -->
    <link rel="icon" type="image/png" href="img/favicon.png">

    <!-- Bootstrap CSS version 5.3 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

 <!-- CSS file -->
    <link rel="stylesheet" href="css/style.css">
</head>

<!-- BODY -->

<body>

<!--Nav bar -->

  <nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">

      <!-- Website logo  -->
      <a class="navbar-brand d-flex align-items-center" href="dashboard.html">
        <img src="img/favicon.png" alt="BookTracker logo" class="nav-logo">
      </a>

      <!-- Hamburger button for small screens -->
      <button class="navbar-toggler" 
              type="button" 
              data-bs-toggle="collapse" 
              data-bs-target="#navbarNav" 
              aria-controls="navbarNav" 
              aria-expanded="false" 
              aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>

      <!-- Collapsible navbar links -->
      <div class="collapse navbar-collapse" id="navbarNav">

        <!-- Left side links -->
        <ul class="navbar-nav me-auto">
          <li class="nav-item">
            <a class="nav-link active" href="dashboard.html">Home</a>
          </li>

          <li class="nav-item">
            <a class="nav-link" href="browse.html">Search</a>
          </li>

          <li class="nav-item">
            <a class="nav-link" href="mybooks.html">My Books</a>
          </li>

          <li class="nav-item">
            <a class="nav-link" href="account.html">Account</a>
          </li>
        </ul>

        <!-- Right side logout button -->
        <a href="login.html" class="btn btn-outline-light logout-btn">Logout</a>
      </div>
    </div>
  </nav>

  <!-- My Books page content -->
  <div class="container py-5">

    <!-- Page heading -->
    <div class="mb-4">
      <h2 class="section-title">My Books</h2>
      <p class="section-subtitle">
        Organize your books by reading status.
      </p>
    </div>

    <!-- Currently Reading -->
    <div class="mb-5">
      <h4 class="section-small-title mb-3">Currently Reading</h4>

      <div class="row g-4">
        <div class="col-md-3">
          <div class="card h-100">
            <div class="book-placeholder">Book Cover</div>
            <div class="card-body">
              <h6 class="card-title">Book Title</h6>
              <p class="card-text">Author Name</p>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Read Next -->
    <div class="mb-5">
      <h4 class="section-small-title mb-3">Read Next</h4>

      <div class="row g-4">
        <div class="col-md-3">
          <div class="card h-100">
            <div class="book-placeholder">Book Cover</div>
            <div class="card-body">
              <h6 class="card-title">Book Title</h6>
              <p class="card-text">Author Name</p>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Already Read -->
    <div class="mb-5">
      <h4 class="section-small-title mb-3">Already Read</h4>

      <div class="row g-4">
        <div class="col-md-3">
          <div class="card h-100">
            <div class="book-placeholder">Book Cover</div>
            <div class="card-body">
              <h6 class="card-title">Book Title</h6>
              <p class="card-text">Author Name</p>
            </div>
          </div>
        </div>
      </div>
    </div>

  </div>

  <!-- Bootstrap JavaScript -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
