<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | BookTracker</title>

    <!-- Bootstrap 5  -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">

    <!-- This centers the register card on the page -->
    <div class="container min-vh-100 d-flex justify-content-center align-items-center">
        
        <!-- Login card -->
        <div class="card shadow p-4 border-0 rounded-4" style="max-width: 400px; width: 100%;">
            <div class="card-body">

                <!-- Title -->
                <h1 class="text-center mb-2">BookTracker</h1>
                <h4 class="text-center mb-4">Login</h4>

                <!-- Login form -->
                <form>
                    
                    <!-- Email input -->
                    <div class="mb-3">
                        <label for="email" class="form-label">Email address</label>
                        <input type="email" class="form-control" id="email" name="email" required>
                    </div>

                    <!-- Password input -->
                    <div class="mb-3">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" class="form-control" id="password" name="password" required>
                    </div>

                    <!-- Login button -->
                    <button type="submit" class="btn btn-primary w-100">Login</button>
                </form>

                <!-- Link to register page if user does not have account -->
                <p class="text-center mt-3 mb-0">
                    Don't have an account? <a href="register.html">Create an account</a>
                </p>

            </div>
        </div>
    </div>

    <!-- Bootstrap JS bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
