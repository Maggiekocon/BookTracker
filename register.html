<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | BookTracker</title>

    <!-- Bootstrap 5  -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- My custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">

    <!-- This centers the register card on the page -->
    <div class="container min-vh-100 d-flex justify-content-center align-items-center">
        
        <!-- Register card -->
        <div class="card shadow p-4 border-0 rounded-4" style="max-width: 420px; width: 100%;">
            <div class="card-body">

                <!-- Page heading -->
                <h1 class="text-center mb-2">BookTracker</h1>
                <h4 class="text-center mb-4">Create Account</h4>

                <!-- Register form -->
                <form>
                    
                    <!-- Full name -->
                    <div class="mb-3">
                        <label for="fullname" class="form-label">Full Name</label>
                        <input type="text" class="form-control" id="fullname" name="fullname" required>
                    </div>

                    <!-- Email -->
                    <div class="mb-3">
                        <label for="email" class="form-label">Email address</label>
                        <input type="email" class="form-control" id="email" name="email" required>
                    </div>

                    <!-- Password -->
                    <div class="mb-3">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" class="form-control" id="password" name="password" required>
                    </div>

                    <!-- Confirm password -->
                    <div class="mb-3">
                        <label for="confirmPassword" class="form-label">Confirm Password</label>
                        <input type="password" class="form-control" id="confirmPassword" name="confirmPassword" required>
                    </div>

                    <!-- Register button -->
                    <button type="submit" class="btn btn-primary w-100">Register</button>
                </form>

                <!-- Link back to login -->
                <p class="form-link mb-0">
                    Already have an account? <a href="login.html">Login</a>
                </p>

            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
