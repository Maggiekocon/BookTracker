  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand" href="dashboard.html">BookTracker</a>

      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>

      <div class="collapse navbar-collapse" id="navbarNav">

<!-- My Books Section -->
<div class="container mt-4">
  <h2>My Books</h2>

  <!-- Currently Reading -->
  <h4 class="mt-4">Currently Reading</h4>
  <div class="row">
    <div class="col-md-3">
      <div class="card shadow-sm mb-4">
        <div class="bg-secondary text-white d-flex justify-content-center align-items-center" style="height: 200px;">
          Book Cover
        </div>
        <div class="card-body">
          <h6 class="card-title">Book Title</h6>
          <p class="card-text">Author Name</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Read Next -->
  <h4 class="mt-4">Read Next</h4>
  <div class="row">
    <div class="col-md-3">
      <div class="card shadow-sm mb-4">
        <div class="bg-secondary text-white d-flex justify-content-center align-items-center" style="height: 200px;">
          Book Cover
        </div>
        <div class="card-body">
          <h6 class="card-title">Book Title</h6>
          <p class="card-text">Author Name</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Already Read -->
  <h4 class="mt-4">Already Read</h4>
  <div class="row">
    <div class="col-md-3">
      <div class="card shadow-sm mb-4">
        <div class="bg-secondary text-white d-flex justify-content-center align-items-center" style="height: 200px;">
          Book Cover
        </div>
        <div class="card-body">
          <h6 class="card-title">Book Title</h6>

      </div>
    </div>
  </div>

</div>
